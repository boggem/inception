volumes:
    mariadb:
         name: mariadb
         driver: local
         driver_opts:
           type: none
           o: bind
           device: /home/gboggion/data/mariadb

    wordpress:
        name: wordpress
        driver: local
        driver_opts:
          type: none
          o: bind
          device: /home/gboggion/data/wordpress

networks:
    network:
        name: docker-network
        driver: bridge

services:
    mariadb:
        container_name: mariadb
        build: ./requirements/mariadb
        image: mariadb:10.11.11
        restart: always
        env_file: .env
        expose: 
            - "${INCEPTION_MARIADB_PORT}"
        volumes:
            - mariadb:/var/lib/mysql
        networks:
            - network
        healthcheck:
            test: ["CMD", "mariadb-admin", "ping", "--protocol=tcp", "--host=localhost", "--port=${INCEPTION_MARIADB_PORT}", "-u${INCEPTION_WP_DB_USER}", "-p${INCEPTION_WP_DB_USER_PASSWORD}"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 120s

    wordpress:
        container_name: wordpress
        build: ./requirements/wordpress
        image: wordpress:6.7.2
        restart: always
        env_file: .env
        expose:
            - "${INCEPTION_WP_PORT}"
        networks:
          - network
        volumes:
          - wordpress:/var/www/html
        depends_on:
          mariadb:
            condition: service_healthy
        healthcheck:
            test: ["CMD", "test", "-f", "/var/www/html/wp-login.php"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 300s

    nginx:
        container_name: nginx
        build: ./requirements/nginx
        image: nginx:1.26.2
        restart: always
        env_file: .env
        depends_on:
          wordpress:
            condition: service_healthy
        networks:
          - network
        ports:
          - "${INCEPTION_NGINX_PORT}:${INCEPTION_NGINX_PORT}"
        volumes:
          - wordpress:/var/www/html

